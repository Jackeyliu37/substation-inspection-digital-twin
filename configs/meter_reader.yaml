schema_version: 1
locator_class: meter
assets:
  meter-oil-01:
    sensor_id: meter-oil-sensor-01
    minimum: 0.0
    maximum: 100.0
    unit: percent
  meter-pressure-01:
    sensor_id: meter-pressure-sensor-01
    minimum: 0.0
    maximum: 2.0
    unit: MPa
opencv:
  method: hsv-red-needle-vector-v1
  start_angle_radians: -2.35619449019
  end_angle_radians: 2.35619449019
  minimum_red_saturation: 90
  minimum_red_value: 45
  note: The locator supplies the crop; OpenCV extracts the project-owned red needle and maps its calibrated sweep to the asset range.
